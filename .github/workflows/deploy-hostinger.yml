name: Deploy → waxapp.mx (Hostinger)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push-dist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: nytjvcykmimblubegxjq

      - name: Push dist/ a branch hostinger-deploy
        run: |
          git config user.email "deploy@waxapp.mx"
          git config user.name "WAXAPP Deploy Bot"
          git checkout --orphan hostinger-deploy
          git rm -rf . --quiet || true
          cp -r dist/. .
          git add -A
          git commit -m "deploy: build $(date +'%Y-%m-%d %H:%M') from main@$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
          git push origin hostinger-deploy --force
