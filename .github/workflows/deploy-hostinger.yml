name: Deploy → waxapp.mx (Hostinger)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: nytjvcykmimblubegxjq

      - name: Deploy via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -qq

          # Escribir credenciales en .netrc para evitar problemas con caracteres especiales
          cat > ~/.netrc << EOF
          machine $FTP_HOST
          login $FTP_USER
          password $FTP_PASS
          EOF
          chmod 600 ~/.netrc

          lftp -c "
            set ftp:ssl-allow no
            set ftp:passive-mode yes
            set net:timeout 30
            set net:max-retries 3
            open ftp://$FTP_HOST
            mirror --reverse --delete --no-perms --verbose ./dist/ /public_html/
            bye
          "
